name: TestFlight Release

# Triggers on version tags (e.g. v1.0.0) or manual dispatch.
# To release: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: testflight-release
  cancel-in-progress: false  # Never cancel an in-flight upload

env:
  PROJECT_PATH: MarkIT/MarkIT/MarkIT.xcodeproj
  SCHEME: MarkIT
  EXPORT_OPTIONS_PLIST: MarkIT/ExportOptions.plist
  ARCHIVE_PATH: ${{ github.workspace }}/build/MarkIT.xcarchive
  EXPORT_PATH: ${{ github.workspace }}/build/export
  BUNDLE_ID: com.mobile.MarkIT
  DEVELOPMENT_TEAM: 3AKEMCF7CZ
  KEYCHAIN_NAME: ci-signing.keychain-db
  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

jobs:
  deploy:
    runs-on: macos-latest
    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Xcode version ───────────────────────────────────────────────
      # IMPORTANT: This project was created with Xcode 26 (IPHONEOS_DEPLOYMENT_TARGET=26.2).
      # GitHub-hosted macos-latest runners currently ship Xcode 16.x.
      # OPTIONS:
      #   A) Use a self-hosted macOS runner with Xcode 26 installed (change runs-on above).
      #   B) Wait until GitHub ships a runner image with Xcode 26.
      #   C) Lower IPHONEOS_DEPLOYMENT_TARGET to 17.0 in Xcode to build on Xcode 16.
      # The line below selects the latest available Xcode on the runner.
      # Update the path once Xcode 26 becomes available on GitHub runners.
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer 2>/dev/null \
            || sudo xcode-select -s $(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer
          xcodebuild -version

      # ── 3. Build number ────────────────────────────────────────────────
      # CURRENT_PROJECT_VERSION (CFBundleVersion) must be unique per App Store Connect upload.
      # GITHUB_RUN_NUMBER is monotonically increasing — safe to use as build number.
      - name: Set build number
        run: |
          /usr/libexec/PlistBuddy -c \
            "Set :objects:$(xcodebuild -project $PROJECT_PATH -showBuildSettings \
              -configuration Release 2>/dev/null \
              | grep CURRENT_PROJECT_VERSION | head -1 | awk '{print $3}') ${{ github.run_number }}" \
            "$PROJECT_PATH/project.pbxproj" 2>/dev/null || true
          # Simpler fallback: pass as xcodebuild override (used in the archive step)
          echo "BUILD_NUMBER=${{ github.run_number }}" >> "$GITHUB_ENV"

      # ── 4. Keychain ────────────────────────────────────────────────────
      - name: Create temporary keychain
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          # Prepend new keychain to the search list while preserving existing ones
          security list-keychains -d user -s "$KEYCHAIN_NAME" \
            $(security list-keychains -d user | tr -d '"' | tr '\n' ' ')

      # ── 5. Certificate ─────────────────────────────────────────────────
      - name: Import distribution certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          CERT_PATH=$(mktemp /tmp/dist_cert.XXXXXX.p12)
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_NAME" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild

          # Allow codesign to access the private key without a UI prompt
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_NAME"

          rm -f "$CERT_PATH"

      # ── 6. Provisioning profile ────────────────────────────────────────
      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$(mktemp /tmp/profile.XXXXXX.mobileprovision)
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"

          # Extract the UUID so the file is named correctly (required by Xcode)
          PP_UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -)
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          cp "$PP_PATH" "$PROFILES_DIR/$PP_UUID.mobileprovision"
          rm -f "$PP_PATH"

          echo "Installed profile UUID: $PP_UUID"
          echo "PROVISIONING_PROFILE_UUID=$PP_UUID" >> "$GITHUB_ENV"

      # Inject the resolved UUID into ExportOptions.plist at runtime.
      # This is more reliable than using a display name which can change.
      - name: Inject profile UUID into ExportOptions.plist
        run: |
          /usr/libexec/PlistBuddy -c \
            "Set :provisioningProfiles:$BUNDLE_ID $PROVISIONING_PROFILE_UUID" \
            "$EXPORT_OPTIONS_PLIST"

      # ── 7. Archive ─────────────────────────────────────────────────────
      - name: Archive
        run: |
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_UUID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_NAME"

      - name: Verify archive
        run: |
          if [ ! -d "$ARCHIVE_PATH" ]; then
            echo "ERROR: Archive not found at $ARCHIVE_PATH" && exit 1
          fi
          echo "Archive OK"

      # ── 8. Export IPA ──────────────────────────────────────────────────
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST"

      - name: Locate IPA
        run: |
          IPA=$(find "$EXPORT_PATH" -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            echo "ERROR: No IPA found in $EXPORT_PATH" && ls -la "$EXPORT_PATH" && exit 1
          fi
          echo "IPA_PATH=$IPA" >> "$GITHUB_ENV"
          echo "IPA ready: $IPA"

      # ── 9. Upload to TestFlight ────────────────────────────────────────
      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          ASC_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          KEY_PATH=$(mktemp /tmp/AuthKey.XXXXXX.p8)
          echo "$ASC_PRIVATE_KEY_BASE64" | base64 --decode > "$KEY_PATH"

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --private-key "$KEY_PATH" \
            --verbose

          rm -f "$KEY_PATH"

      # ── 10. Save IPA as artifact (30 days) ─────────────────────────────
      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MarkIT-${{ github.ref_name }}-build${{ github.run_number }}
          path: ${{ env.EXPORT_PATH }}/*.ipa
          retention-days: 30

      # ── 11. Cleanup (always runs) ──────────────────────────────────────
      - name: Clean up
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_NAME" 2>/dev/null || true
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/$PROVISIONING_PROFILE_UUID.mobileprovision" 2>/dev/null || true
